         .mogus {

<body>
    <button id="btnStart">start</button>
    <button id="btnStop" style="left: 60px">stop</button>
    <div class="trailingDiv"></div>
    <div id="ball">

<script>
    const ball = document.getElementById("ball");
    const dvdLogo = document.querySelector("#ball > svg");
    //list color
    const dvdColors = [
        "#FF5733", // Red/Orange
        "#33FF57", // Green
        "#3357FF", // Blue
        "#FF33A8", // Magenta
        "#33FFF5", // Cyan
        "#F5FF33", // Yellow
        "#FCB001", // Orange
        "#FFFFFF",  // White
    ];
    // init necessary values for animating
    const velocityLimit = 3;
    let positionX = 1;
    let velocityX = 3;
    let positionY = 1;
    let velocityY = 3;
    let stopNow = false;
    const trailingLimit = 100;
    let randomColorIndex;
    // init color 
    dvdLogo.setAttribute('fill', "cyan");

    // randomize color function
    function randomColor() {
        randomColorIndex = Math.floor(Math.random() * dvdColors.length);
        dvdLogo.setAttribute('fill', dvdColors[randomColorIndex]);
    }

    // trailing div cell generator function based on coordination
    function createTrailingDiv(posX, posY) {
        const trailingCell = document.createElement('div');
        trailingCell.className = 'trailingDiv';
        trailingCell.style.left = posX + "px";
        trailingCell.style.top = posY + "px";
        trailingCell.style.backgroundColor = dvdColors[randomColorIndex];
        document.body.appendChild(trailingCell);
    }
    function update() {
        ball.style.left = positionX + "px";
        positionX += velocityX;

        ball.style.top = positionY + "px";
        positionY += velocityY;

        if (positionX > window.innerWidth - 100) {
            positionX = window.innerWidth - 100;
            velocityX = -(Math.floor(Math.random() * velocityLimit) + 1);
            randomColor();
        }

        if (positionX < 0) {
            positionX = 0;
            velocityX = Math.floor(Math.random() * velocityLimit) + 1;
            randomColor();
        }

        if (positionY > window.innerHeight - 50) {
            positionY = window.innerHeight - 50;
            velocityY = -(Math.floor(Math.random() * velocityLimit) + 1);
            randomColor();

        }

        if (positionY < 0) {
            positionY = 0;
            velocityY = Math.floor(Math.random() * velocityLimit) + 1;
            randomColor();

        }
    }
    
    function animate() {
        if (stopNow) return;
        update();
        createTrailingDiv(positionX + 50, positionY + 25);

        // select trailing sibling div within the body
        const trailingSibling = document.querySelectorAll("body > .trailingDiv");
 //       if (trailingSibling.length > trailingLimit) trailingSibling[0].remove();
        requestAnimationFrame(animate);
    }
    document.getElementById("btnStart").addEventListener("click", () => requestAnimationFrame(animate));
    document.getElementById("btnStop").addEventListener("click", () => { stopNow = !stopNow });
</script>
