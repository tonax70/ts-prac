<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .sigma {
            display: none;
        }

        .sigma.yap {
            display: block;
        }
    </style>
</head>

<body>
    <button id="testA">chick</button>
    <button id="testB">remove it boi</button>
    <button id="testC">show secret plz</button>
    <h1 id="yapWarning">Start yapping in 5 seconds.</h1>
    <img class="sigma" src="./wutDa.png" alt="wut da">
</body>
<script>
    let timeAmt = 5;
    const getA = document.getElementById("testA");
    const getB = document.getElementById("testB");
    const getC = document.getElementById("testC");
    getA.addEventListener("click", () => {
        const el = document.createElement("p");
        el.innerHTML = "gud";
        document.body.appendChild(el);
    })

    getB.addEventListener("click", () => {
        if (document.body.lastElementChild.id !== "testB") {
            document.body.lastElementChild.remove();

        }
    })

    getC.addEventListener("click", () => {
        document.querySelector(".sigma").classList.toggle("yap")
    })
    // start to yap after 5 s
    const itrvId = setInterval(() => {
        if (timeAmt > 0) timeAmt--;
        document.querySelector("#yapWarning").textContent = `Start yapping in ${timeAmt} seconds.`;
    }, 1000);

    setTimeout(function () {
        document.querySelector(".sigma").classList.toggle("yap");
        document.querySelector("#yapWarning").textContent = ``;
        clearInterval(itrvId);
    }, 5000);
</script>

</html>
