<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Build a Set of Football Team Cards
    </title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1 class="title">Team stats</h1>
    <main>
      <div class="team-stats">
        <p>Team: <span id="team"></span></p>
        <p>Year: <span id="year"></span></p>
        <p>Head coach: <span id="head-coach"></span></p>
      </div>
      <label class="options-label" for="players">Filter Teammates:</label>
      <select name="players" id="players">
        <option value="all">All Players</option>
        <option value="forward">Position Forward</option>
        <option value="midfielder">Position Midfielder</option>
        <option value="defender">Position Defender</option>
        <option value="goalkeeper">Position Goalkeeper</option>
      </select>
      <div class="cards" id="player-cards"></div>
    </main>
    <footer>&copy; freeCodeCamp</footer>
    <script>
let footballTeam = {
  team : 'TC',
  year : 2000,
  headCoach : 'NCT',
  players : [
{name: "p1", position: "forward", isCaptain:true},
{name: "p2", position: "midfielder", isCaptain:false},
{name: "p3", position: "defender", isCaptain:false},
{name: "p4", position: "goalkeeper", isCaptain:false},

  ]
};

document.querySelector('#team').textContent = footballTeam.team;
document.querySelector('#year').textContent = footballTeam.year;
document.querySelector('#head-coach').textContent = footballTeam.headCoach;

document.querySelector('#players').addEventListener('change', (e) => {
  let message = "";
  footballTeam.players.filter((p) => p.position === e.target.value || e.target.value === 'all').map(p => {
    message+= `
    <div class="player-card">
  <h2>${p.isCaptain? "(Captain)" : ""} ${p.name}</h2>
  <p>Position: ${p.position}</p>
</div>
    `
  });
   document.querySelector('.cards').innerHTML = message;
}

)

    </script>
  </body>
</html>
